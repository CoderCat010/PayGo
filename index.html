<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayGo</title>

    <!-- DaisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- css file -->
    <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-slate-800">
    <!-- 
    login page 
    -->
    <section class="max-w-lg min-h-screen mx-auto py-6 bg-gray-200">
        <!-- !HEADER PART -->
        <header>
            <!-- navbar -->
            <nav class="flex justify-center items-center mt-20">
                <div class="relative flex justify-center items-center w-9/12">
                    <img class="w-56 absolute -mb-28" src="./images/bg.png" alt="">
                    <img class="w-16" src="./images/Group.png" alt="">
                </div>
            </nav>


            <!-- Login Part -->
            <form>
                <div class="bg-white flex flex-col justify-center items-center h-96 mt-10 max-w-xs mx-auto shadow-lg rounded-[30px]">
                    <div class="mb-7">
                        <!-- title -->
                        <p class="font-bold">Email</p>
                        <!-- email -->
                        <input class="bg-neutral-100 border-none focus:outline-none pr-10 py-3 pl-5 mt-2 mb-5 rounded-full" type="email" placeholder="Enter Your Email" id="emailAccount" required>

                        <!-- title -->
                        <p class="font-bold">Password</p>
                        <!-- passward filed -->
                        <input class="bg-neutral-100 border-none focus:outline-none pr-10 py-3 pl-5 mt-2 rounded-full" type="password" placeholder="Enter Your Password" id="passwordInfo" required>
                    </div>

                    <button id="login-btn" class="bg-[#0874F2] font-semibold text-white border-none py-3 rounded-full w-60">Login</button>
                </div>
            </form>
            
        </header>
    </section>









    <!-- js file -->
     <script src="./script.js"></script>
</body>
</html>
