<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayGo</title>

    <!-- DaisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- css file -->
    <link rel="stylesheet" href="./style.css">

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

</head>
<body class="bg-slate-900">
    <!-- 
    login page 
    -->
    <section class="max-w-md min-h-screen mx-auto py-6 bg-gray-200">
        <!-- !HEADER PART -->
        <header>
            <!-- navbar -->
            <nav class="flex justify-center items-center mt-20">
                <div class="relative flex justify-center items-center w-9/12">
                    <img class="w-56 absolute -mb-28" src="./images/bg.png" alt="">
                    <img class="w-16" src="./images/Group.png" alt="">
                </div>
            </nav>


            <!-- Login Part -->
            <form>
                <div class="bg-white flex flex-col justify-center items-center h-96 mt-10 max-w-xs mx-auto shadow-lg rounded-[30px]">
                    <div>
                        <!-- title -->
                        <p class="font-bold">Account</p>
                        <!-- Account Number -->
                        <input class="bg-neutral-100 border-none focus:outline-none pr-10 py-3 pl-5 mt-2 mb-5 rounded-full" type="number" placeholder="Enter Your Number" id="accountNumber" required>

                        <!-- title -->
                        <p class="font-bold">Password</p>
                        <!-- passward filed -->
                        <input class="bg-neutral-100 border-none focus:outline-none pr-10 py-3 pl-5 mt-2 rounded-full" type="password" placeholder="Enter Your Password" id="passwordInfo" required>
                    </div>

                    <button id="login-btn" class="bg-[#0874F2] font-semibold text-white border-none py-3 mt-7 rounded-full w-60">Login</button>
                </div>
            </form>
            
        </header>
    </section>









    <!-- js file -->
     <script src="./script.js"></script>
</body>
</html>
