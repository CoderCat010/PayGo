<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- css file -->
    <link rel="stylesheet" href="./style.css">

    <!-- DaisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">


    <!-- icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css" integrity="sha512-XcIsjKMcuVe0Ucj/xgIXQnytNwBttJbNjltBV18IOnru2lDPe9KRRyvCXw6Y5H415vbBLRm8+q6fmLUU7DfO6Q==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body class="bg-slate-900">
    
    <!-- !HEADER PART -->
    <section class="max-w-lg min-h-screen mx-auto py-6 bg-white">
        <header class="mx-5">
            <!-- 
            navbar
            -->
            <nav class="flex justify-between items-center">
                <!-- * navbar logo -->
                <div class="flex items-center">
                    <!-- logo -->
                    <img src="./images/Group.png" alt="">

                    <!-- logo title & description -->
                    <div class="flex flex-col">
                        <h2 class="font-bold text-xl text-[#080808]">$00000</h2>
                        <p class="text-base text-[#0808089a] pt-2">Current Balance</p>
                    </div>
                </div>

                <!--* logout button -->
                <div>
                    <button class="px-4 py-2 rounded-lg border border-[#0000004f] text-[#0808089a]">Log Out <i class="ri-logout-circle-r-line"></i></button>
                </div>
            </nav>


            <!-- 
            banner part
            -->
            <div>
                <hr class="border-[#08080817] mt-5">
                <!--* banner title and description -->
                <div class="mt-12">
                    <h1 class="text-2xl font-bold">Welcome to Payooo!</h1>
                    <p class="pt-5 text-[#08080888]">Enjoy easy and convenient financial services with us. Cashout charge is low and comfy. </p>
                </div>

                <!-- img cards container -->
                <div class="flex justify-center mt-10">
                    <div class="grid grid-cols-3 justify-center gap-x-5 gap-y-7">
                        <!-- add money -->
                        <div class="flex flex-col items-center justify-center px-11 h-28 rounded-lg border border-[#0000004f] hover:border-[2px] hover:border-[#0874F2] text-[#0808089a] hover:text-[#0874F2] hover:font-semibold">
                            <img src="./images/wallet1.png" alt="">
                            <p class="pt-3 text-sm whitespace-nowrap">Add Money</p>
                        </div>
                        
                        <!-- Cash Out -->
                        <div class="flex flex-col items-center justify-center px-11 h-28 rounded-lg border border-[#0000004f] hover:border-[2px] hover:border-[#0874F2] text-[#0808089a] hover:text-[#0874F2] hover:font-semibold">
                            <img src="./images/send1.png" alt="">
                            <p class="pt-3 text-sm whitespace-nowrap">CashOut</p>
                        </div>

                        <!-- Transfer Money -->
                        <div class="flex flex-col items-center justify-center px-11 h-28 rounded-lg border border-[#0000004f] hover:border-[2px] hover:border-[#0874F2] text-[#0808089a] hover:text-[#0874F2] hover:font-semibold">
                            <img src="./images/money1.png" alt="">
                            <p class="pt-3 text-sm whitespace-nowrap">Transfer Money</p>
                        </div>

                        <!-- Get Bonus -->
                        <div class="flex flex-col items-center justify-center px-11 h-28 rounded-lg border border-[#0000004f] hover:border-[2px] hover:border-[#0874F2] text-[#0808089a] hover:text-[#0874F2] hover:font-semibold">
                            <img src="./images/bonus1.png" alt="">
                            <p class="pt-3 text-sm whitespace-nowrap">Get Bonus</p>
                        </div>
                        
                        <!-- Pay Bill -->
                        <div class="flex flex-col items-center justify-center px-11 h-28 rounded-lg border border-[#0000004f] hover:border-[2px] hover:border-[#0874F2] text-[#0808089a] hover:text-[#0874F2] hover:font-semibold">
                            <img src="./images/purse1.png" alt="">
                            <p class="pt-3 text-sm whitespace-nowrap">Pay Bill</p>
                        </div>

                        <!-- Transaction -->
                        <div class="flex flex-col items-center justify-center px-11 h-28 rounded-lg border border-[#0000004f] hover:border-[2px] hover:border-[#0874F2] text-[#0808089a] hover:text-[#0874F2] hover:font-semibold">
                            <img src="./images/transaction1.png" alt="">
                            <p class="pt-3 text-sm whitespace-nowrap">Transaction</p>
                        </div>
                    </div>
                </div>

            </div>








        </header>
    </section>











</body>
</html>
